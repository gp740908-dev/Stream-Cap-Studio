version: "3.9"

# StreamCap Studio — Docker Compose
# Services: api, worker, beat, redis, db, frontend, nginx

services:
  # ─── PostgreSQL Database ────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-streamcap}
      POSTGRES_USER: ${POSTGRES_USER:-streamcap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-streamcap}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ─── Redis (Celery broker + result backend) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ─── FastAPI Backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - SERVICE_TYPE=api
    volumes:
      - ./uploads:/app/uploads          # watermark assets
      - ./outputs:/app/outputs          # final MP4 files
      - /tmp/streamcap:/tmp/streamcap   # temp recording files
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    ports:
      - "8000:8000"

  # ─── Celery Worker (recording + processing tasks) ────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      celery -A celery_app worker
      --loglevel=info
      --concurrency=3
      --queues=recording,processing,default
    env_file: .env
    environment:
      - SERVICE_TYPE=worker
      # Virtual display for headless Chrome via Xvfb
      - DISPLAY=:99
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
      - /tmp/streamcap:/tmp/streamcap
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    # Required capabilities for Xvfb + FFmpeg screen capture
    privileged: false
    shm_size: "2gb"       # Chrome needs large shared memory

  # ─── Celery Beat (job scheduler / cron trigger) ──────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      celery -A celery_app beat
      --loglevel=info
      --scheduler celery.beat.PersistentScheduler
      --schedule /app/celerybeat-schedule
    env_file: .env
    volumes:
      - beat_schedule:/app/celerybeat-schedule
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # ─── Next.js Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost/api}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
    depends_on:
      - api
    networks:
      - internal

  # ─── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro          # optional TLS certs
      - ./outputs:/var/www/outputs:ro           # serve output files directly
    depends_on:
      - api
      - frontend
    networks:
      - internal
      - external

volumes:
  postgres_data:
  redis_data:
  beat_schedule:

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
